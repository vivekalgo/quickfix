name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App
        run: npm run build
        working-directory: apps/customer

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: apps/customer

      - name: Build Android APK
        run: ./gradlew assembleDebug
        working-directory: apps/customer/android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: apps/customer/android/app/build/outputs/apk/debug/app-debug.apk
